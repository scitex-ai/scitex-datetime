name: pr-ci
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Replaces the formerly-inlined import-smoke / audit jobs with thin `uses:`
# calls into scitex-ai/.github reusable workflows. `dep-hygiene-smoke` has
# no reusable equivalent yet and stays inline. `tests` ALSO stays inline —
# it runs INSIDE a pre-baked self-hosted Spartan CI SIF via
# `apptainer exec` with NO per-run install (see the job's own comments and
# `.github/ci/run-in-sif.sh`), a deliberately different mechanism from the
# reusable `pytest-matrix` (which does a fresh `uv venv` + `uv pip install`
# per run on `[self-hosted, spartan-cpu]`). Converting `tests` would
# silently drop the baked-SIF fast path this repo intentionally adopted —
# left alone per the "don't force a mismatch" rule. Triggers/concurrency
# preserved verbatim from the prior local file.
#
# New required-status-check contexts (see comments per job below) may not
# match OLD required-status-check contexts on develop/main branch
# protection — branch protection updated as part of this PR where needed.
#
# NOTE: the reusable `quality-audit` runs
# `scitex-dev ecosystem audit-all "$DIST" --path "$PWD"` (no
# `--no-version-check`), whereas the prior inline `audit` job passed
# `--no-version-check`. Worth watching the first PR run for a new
# version-check-related failure mode that didn't exist before.

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '_skills/**'
      - 'examples/**'
      - '**.md'
      - 'CHANGELOG.*'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  import-smoke:
    # New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit

  dep-hygiene-smoke:
    # No reusable-workflow equivalent yet — left inline.
    name: dep-hygiene-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.11 (uv-managed)
        run: uv python install 3.11
      - name: Bare install (no extras) in uv venv
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv/bin/python .
      - name: Import package
        run: .venv/bin/python -c "import scitex_datetime; print(scitex_datetime.__name__)"

  tests:
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    # Self-hosted Spartan CPU runner (label: spartan-cpu). The runner
    # srun --overlaps an ALREADY-RUNNING SLURM lease, and CI runs INSIDE a
    # reused, pre-built SIF (~/.scitex/dev/containers/ci-cpu.sif on punim0264)
    # that bakes python3.11/3.12/3.13 + the curated ecosystem dep union
    # (scientific core + scitex basics + scitex-dev[all,dev] + pytest). Each
    # run only overlays the checkout via PYTHONPATH — NO per-run install. The
    # SIF IS the cache; rebuild via `scitex-container apptainer build ci-cpu`.
    # fail-loud: a missing SIF / missing dep is a hard error, never a reinstall.
    # NOT migrated to the reusable pytest-matrix (see file header note).
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJson('["3.11", "3.12", "3.13"]') || fromJson('["3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests in the reused CI SIF (apptainer exec — no per-run install)
        run: |
          set -euo pipefail
          # The runner's job shell is --noprofile --norc (no Lmod), so put the
          # self-contained apptainer shim on PATH (it execs the real Apptainer
          # binary directly — no `module`, no login shell).
          export PATH="$HOME/.env-3.11/bin:$PATH"
          command -v apptainer >/dev/null || { echo "::error::apptainer shim not on PATH (~/.env-3.11/bin)"; exit 1; }
          IMG="$HOME/.scitex/dev/containers/ci-cpu.sif"
          if [ ! -f "$IMG" ]; then
            echo "::error::CI SIF missing at $IMG — rebuild it: scitex-container apptainer build ci-cpu"
            exit 1
          fi
          V="${{ matrix.python-version }}"
          export APPTAINER_TMPDIR=/data/gpfs/projects/punim0264/ywatanabe/ci/apptainer-tmp
          mkdir -p "$APPTAINER_TMPDIR"
          # Read-only SIF, NO install: the in-container setup (PYTHONPATH=src +
          # the baked venv bin on PATH) lives in .github/ci/run-in-sif.sh.
          # --bind punim0264 so the $HOME/.scitex symlink resolves inside.
          apptainer exec --pwd "$PWD" --bind /data/gpfs/projects/punim0264 \
            "$IMG" bash .github/ci/run-in-sif.sh "$V"
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  quality-audit:
    # New required-status-check context: "quality-audit / audit"
    uses: scitex-ai/.github/.github/workflows/quality-audit.yml@main
    secrets: inherit
