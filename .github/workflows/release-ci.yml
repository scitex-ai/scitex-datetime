name: release-ci
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Replaces the formerly-inlined tests / import-smoke / audit jobs with thin
# `uses:` calls into scitex-ai/.github reusable workflows — same job
# bodies, now centrally maintained. Unlike `pr-ci.yml`'s `tests` job, this
# `tests` job already used the standard `uv venv` + `uv pip install`
# mechanism on ubuntu-latest (no baked-SIF apptainer step), so it converts
# cleanly. Triggers/concurrency preserved verbatim from the prior local
# file.
#
# New required-status-check contexts (see comments per job below) may not
# match OLD required-status-check contexts on develop/main branch
# protection — branch protection updated as part of this PR where needed.
#
# NOTE: the reusable `quality-audit` runs
# `scitex-dev ecosystem audit-all "$DIST" --path "$PWD"` (no
# `--no-version-check`), whereas the prior inline `audit` job passed
# `--no-version-check`. Worth watching the first push-triggered run for
# a new version-check-related failure mode that didn't exist before.

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pytest-matrix:
    # New required-status-check context: "pytest-matrix / pytest-matrix-on-ubuntu-py<X.YY>"
    uses: scitex-ai/.github/.github/workflows/pytest-matrix.yml@main
    secrets: inherit

  import-smoke:
    # New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit

  quality-audit:
    # New required-status-check context: "quality-audit / audit"
    uses: scitex-ai/.github/.github/workflows/quality-audit.yml@main
    secrets: inherit
