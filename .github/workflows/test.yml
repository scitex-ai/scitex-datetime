name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps + test plugins
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e ".[all,dev]" || pip install -e ".[dev]" || pip install -e .
      - name: Run tests with coverage
        run: |
          python -m pytest "$GITHUB_WORKSPACE/tests/" -v --tb=short --timeout=120 \
            --cov=src/scitex_datetime \
            --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  install-check:
    # Catches undeclared runtime deps that the package's own test suite
    # misses — a package can build, upload, and pass its own tests with
    # the wrong pyproject.toml; the bug only shows up when a fresh user
    # runs `pip install <pkg>` in a clean venv.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel + install + import in a fresh venv
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          python -m venv /tmp/clean-venv
          /tmp/clean-venv/bin/pip install --upgrade pip
          /tmp/clean-venv/bin/pip install dist/*.whl
          /tmp/clean-venv/bin/python -c "import scitex_datetime; print(f'OK: {scitex_datetime.__name__}')"
